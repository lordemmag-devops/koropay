name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            koropay-backend/package-lock.json
            koropay-frontend/package-lock.json

      - name: Build backend
        working-directory: koropay-backend
        run: |
          npm ci
          npx prisma generate --schema=prisma/schema.prisma
          npm run build

      - name: Build frontend
        working-directory: koropay-frontend
        env:
          VITE_API_URL: /api
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
