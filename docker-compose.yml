services:
  postgres:
    image: postgres:16-alpine
    container_name: koropay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: koropay
      POSTGRES_PASSWORD: koropay_pass
      POSTGRES_DB: koropay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koropay"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./koropay-backend
      dockerfile: Dockerfile
    container_name: koropay-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://koropay:koropay_pass@postgres:5432/koropay?schema=public
      JWT_SECRET: koropay_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    command: >
      sh -c "npx prisma migrate deploy &&
             node dist/seed.js &&
             node dist/app.js"

  frontend:
    build:
      context: ./koropay-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: koropay-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
